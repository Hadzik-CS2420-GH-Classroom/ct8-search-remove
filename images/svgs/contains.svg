<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 730">
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .title  { font-size: 18px; font-weight: bold; fill: #1a1a1a; }
    .step-label { font-size: 14px; font-weight: bold; fill: #333; }
    .value  { font-size: 15px; font-weight: bold; fill: #fff; }
    .pointer-label { font-size: 12px; font-weight: bold; fill: #8e44ad; }
    .found  { font-size: 12px; font-weight: bold; fill: #27ae60; }
    .missed { font-size: 12px; font-weight: bold; fill: #e74c3c; }
    .code   { font-size: 12px; fill: #2c3e50; font-family: 'Consolas', monospace; }
    .note   { font-size: 11px; fill: #777; font-style: italic; }
    .value-sm { font-size: 11px; font-weight: bold; fill: #fff; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="ptr-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8e44ad"/>
    </marker>
  </defs>

  <text x="400" y="28" text-anchor="middle" class="title">contains: Single Pointer Traversal</text>

  <!-- ==================== Step 1 ==================== -->
  <text x="20" y="58" class="step-label">Step 1: initialize — current starts at head_</text>
  <text x="20" y="75" class="code">auto* current = head_;</text>

  <!-- head_ above node 2001 -->
  <text x="55" y="95" text-anchor="middle" class="pointer-label">head_</text>
  <line x1="55" y1="100" x2="55" y2="120" stroke="#8e44ad" stroke-width="2" marker-end="url(#ptr-arrow)"/>

  <!-- Node 2001 -->
  <rect x="20"  y="122" width="70" height="40" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <rect x="90"  y="122" width="50" height="40" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="55"  y="147" text-anchor="middle" class="value">2001</text>
  <text x="115" y="147" text-anchor="middle" class="value-sm">next</text>
  <line x1="140" y1="142" x2="178" y2="142" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 2002 -->
  <rect x="180" y="122" width="70" height="40" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <rect x="250" y="122" width="50" height="40" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="215" y="147" text-anchor="middle" class="value">2002</text>
  <text x="275" y="147" text-anchor="middle" class="value-sm">next</text>
  <line x1="300" y1="142" x2="338" y2="142" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 2003 -->
  <rect x="340" y="122" width="70" height="40" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <rect x="410" y="122" width="50" height="40" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="375" y="147" text-anchor="middle" class="value">2003</text>
  <text x="435" y="147" text-anchor="middle" class="value-sm">next</text>
  <line x1="460" y1="142" x2="498" y2="142" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 2004 -->
  <rect x="500" y="122" width="70" height="40" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <rect x="570" y="122" width="50" height="40" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="535" y="147" text-anchor="middle" class="value">2004</text>
  <text x="595" y="147" text-anchor="middle" class="value-sm">next</text>
  <line x1="620" y1="142" x2="658" y2="142" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- nullptr -->
  <rect x="660" y="131" width="68" height="22" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="694" y="147" text-anchor="middle" class="missed">nullptr</text>

  <!-- current pointer below node 2001 -->
  <text x="55" y="185" text-anchor="middle" class="pointer-label">current</text>
  <line x1="55" y1="173" x2="55" y2="169" stroke="#8e44ad" stroke-width="2"/>
  <polygon points="51 169, 55 162, 59 169" fill="#8e44ad"/>

  <!-- ==================== Step 2 ==================== -->
  <text x="20" y="218" class="step-label">Step 2: inspect node — not a match, advance current</text>
  <text x="20" y="235" class="code">if (current-&gt;data == value) return true;   current = current-&gt;next;</text>

  <!-- Node 2001 -->
  <rect x="20"  y="252" width="70" height="40" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <rect x="90"  y="252" width="50" height="40" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="55"  y="277" text-anchor="middle" class="value">2001</text>
  <text x="115" y="277" text-anchor="middle" class="value-sm">next</text>
  <line x1="140" y1="272" x2="178" y2="272" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 2002 -->
  <rect x="180" y="252" width="70" height="40" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <rect x="250" y="252" width="50" height="40" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="215" y="277" text-anchor="middle" class="value">2002</text>
  <text x="275" y="277" text-anchor="middle" class="value-sm">next</text>
  <line x1="300" y1="272" x2="338" y2="272" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 2003 -->
  <rect x="340" y="252" width="70" height="40" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <rect x="410" y="252" width="50" height="40" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="375" y="277" text-anchor="middle" class="value">2003</text>
  <text x="435" y="277" text-anchor="middle" class="value-sm">next</text>
  <line x1="460" y1="272" x2="498" y2="272" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 2004 -->
  <rect x="500" y="252" width="70" height="40" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <rect x="570" y="252" width="50" height="40" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="535" y="277" text-anchor="middle" class="value">2004</text>
  <text x="595" y="277" text-anchor="middle" class="value-sm">next</text>
  <line x1="620" y1="272" x2="658" y2="272" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- nullptr -->
  <rect x="660" y="261" width="68" height="22" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="694" y="277" text-anchor="middle" class="missed">nullptr</text>

  <!-- current pointer below node 2002 -->
  <text x="215" y="315" text-anchor="middle" class="pointer-label">current</text>
  <line x1="215" y1="303" x2="215" y2="299" stroke="#8e44ad" stroke-width="2"/>
  <polygon points="211 299, 215 292, 219 299" fill="#8e44ad"/>

  <text x="400" y="342" text-anchor="middle" class="note">2001 ≠ value — loop continues, advancing current one step each iteration</text>

  <!-- ==================== Outcome A — FOUND ==================== -->
  <text x="20" y="372" class="step-label">Outcome A: match found — return true</text>
  <text x="20" y="389" class="code">if (current-&gt;data == value) return true;</text>

  <!-- Node 2001 -->
  <rect x="20"  y="406" width="70" height="40" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <rect x="90"  y="406" width="50" height="40" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="55"  y="431" text-anchor="middle" class="value">2001</text>
  <text x="115" y="431" text-anchor="middle" class="value-sm">next</text>
  <line x1="140" y1="426" x2="178" y2="426" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 2002 -->
  <rect x="180" y="406" width="70" height="40" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <rect x="250" y="406" width="50" height="40" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="215" y="431" text-anchor="middle" class="value">2002</text>
  <text x="275" y="431" text-anchor="middle" class="value-sm">next</text>
  <line x1="300" y1="426" x2="338" y2="426" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 2003 — MATCH (yellow highlight) -->
  <rect x="340" y="406" width="70" height="40" rx="4" fill="#f1c40f" stroke="#d4ac0d" stroke-width="3"/>
  <rect x="410" y="406" width="50" height="40" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="375" y="431" text-anchor="middle" class="value">2003</text>
  <text x="435" y="431" text-anchor="middle" class="value-sm">next</text>
  <line x1="460" y1="426" x2="498" y2="426" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 2004 -->
  <rect x="500" y="406" width="70" height="40" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <rect x="570" y="406" width="50" height="40" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="535" y="431" text-anchor="middle" class="value">2004</text>
  <text x="595" y="431" text-anchor="middle" class="value-sm">next</text>
  <line x1="620" y1="426" x2="658" y2="426" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- nullptr -->
  <rect x="660" y="415" width="68" height="22" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="694" y="431" text-anchor="middle" class="missed">nullptr</text>

  <!-- current pointer below node 2003 -->
  <text x="375" y="469" text-anchor="middle" class="pointer-label">current</text>
  <line x1="375" y1="457" x2="375" y2="453" stroke="#8e44ad" stroke-width="2"/>
  <polygon points="371 453, 375 446, 379 453" fill="#8e44ad"/>

  <text x="375" y="497" text-anchor="middle" class="found">current-&gt;data == 2003 == value  →  return true</text>

  <!-- ==================== Outcome B — NOT FOUND ==================== -->
  <text x="20" y="527" class="step-label">Outcome B: value not in list — return false</text>
  <text x="20" y="544" class="code">// loop exits when current reaches nullptr</text>

  <!-- Node 2001 -->
  <rect x="20"  y="561" width="70" height="40" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <rect x="90"  y="561" width="50" height="40" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="55"  y="586" text-anchor="middle" class="value">2001</text>
  <text x="115" y="586" text-anchor="middle" class="value-sm">next</text>
  <line x1="140" y1="581" x2="178" y2="581" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 2002 -->
  <rect x="180" y="561" width="70" height="40" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <rect x="250" y="561" width="50" height="40" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="215" y="586" text-anchor="middle" class="value">2002</text>
  <text x="275" y="586" text-anchor="middle" class="value-sm">next</text>
  <line x1="300" y1="581" x2="338" y2="581" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 2003 -->
  <rect x="340" y="561" width="70" height="40" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <rect x="410" y="561" width="50" height="40" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="375" y="586" text-anchor="middle" class="value">2003</text>
  <text x="435" y="586" text-anchor="middle" class="value-sm">next</text>
  <line x1="460" y1="581" x2="498" y2="581" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 2004 -->
  <rect x="500" y="561" width="70" height="40" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <rect x="570" y="561" width="50" height="40" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="535" y="586" text-anchor="middle" class="value">2004</text>
  <text x="595" y="586" text-anchor="middle" class="value-sm">next</text>
  <line x1="620" y1="581" x2="658" y2="581" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- nullptr — current lands here -->
  <rect x="660" y="570" width="68" height="22" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="694" y="586" text-anchor="middle" class="missed">nullptr</text>

  <!-- current pointer below nullptr box -->
  <text x="694" y="625" text-anchor="middle" class="pointer-label">current</text>
  <line x1="694" y1="613" x2="694" y2="598" stroke="#8e44ad" stroke-width="2"/>
  <polygon points="690 598, 694 592, 698 598" fill="#8e44ad"/>

  <text x="400" y="658" text-anchor="middle" class="missed">current == nullptr — all nodes inspected, value not found  →  return false</text>

  <!-- Bottom note -->
  <text x="400" y="685" text-anchor="middle" class="note">O(n) worst case — no shortcut for an unsorted list. Every node may need inspection.</text>
</svg>
