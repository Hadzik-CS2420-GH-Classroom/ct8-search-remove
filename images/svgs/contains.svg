<svg xmlns="http://www.w3.org/2000/svg"
     width="640" height="300" viewBox="0 0 640 300"
     font-family="Consolas, 'Courier New', monospace" font-size="13">

  <defs>
    <!-- Gray arrowhead for next pointers -->
    <marker id="arr-gray" markerWidth="8" markerHeight="6"
            refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <!-- Muted arrowhead for not-found panel -->
    <marker id="arr-muted" markerWidth="8" markerHeight="6"
            refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#cbd5e1"/>
    </marker>
    <!-- Orange arrowhead for current pointer -->
    <marker id="arr-current" markerWidth="8" markerHeight="6"
            refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ea580c"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- PANEL 1 — FOUND: contains(2003) returns true                       -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <!-- Panel label -->
  <text x="16" y="20" font-weight="bold" fill="#1e293b" font-size="13">contains(2003)</text>
  <text x="136" y="20" fill="#16a34a" font-weight="bold" font-size="13">→  return true</text>

  <!-- Node 2001 -->
  <rect x="16" y="32" width="76" height="36" rx="4"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="54" y="55" text-anchor="middle" fill="#1e3a8a">2001</text>
  <!-- next → -->
  <line x1="92" y1="50" x2="126" y2="50"
        stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Node 2002 -->
  <rect x="126" y="32" width="76" height="36" rx="4"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="164" y="55" text-anchor="middle" fill="#1e3a8a">2002</text>
  <!-- next → -->
  <line x1="202" y1="50" x2="236" y2="50"
        stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Node 2003 — MATCH (green highlight) -->
  <rect x="236" y="28" width="76" height="44" rx="4"
        fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="274" y="50" text-anchor="middle" fill="#15803d" font-weight="bold" font-size="14">2003</text>
  <text x="274" y="64" text-anchor="middle" fill="#16a34a" font-size="10" font-weight="bold">✓ match</text>
  <!-- next → -->
  <line x1="312" y1="50" x2="346" y2="50"
        stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Node 2004 -->
  <rect x="346" y="32" width="76" height="36" rx="4"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="384" y="55" text-anchor="middle" fill="#1e3a8a">2004</text>
  <!-- next → nullptr -->
  <line x1="422" y1="50" x2="456" y2="50"
        stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="462" y="54" fill="#94a3b8" font-style="italic" font-size="12">nullptr</text>

  <!-- current pointer (orange) — pointing up at node 2003 -->
  <line x1="274" y1="100" x2="274" y2="75"
        stroke="#ea580c" stroke-width="2" marker-end="url(#arr-current)"/>
  <text x="274" y="116" text-anchor="middle" fill="#ea580c" font-weight="bold">current</text>
  <text x="274" y="133" text-anchor="middle" fill="#64748b" font-size="11">current-&gt;data == 2003</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- Divider                                                             -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <line x1="16" y1="150" x2="600" y2="150"
        stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- PANEL 2 — NOT FOUND: contains(9999) returns false                  -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <!-- Panel label -->
  <text x="16" y="170" font-weight="bold" fill="#1e293b" font-size="13">contains(9999)</text>
  <text x="136" y="170" fill="#dc2626" font-weight="bold" font-size="13">→  return false</text>

  <!-- All nodes — muted (all inspected, none matched) -->
  <!-- Node 2001 -->
  <rect x="16" y="182" width="76" height="36" rx="4"
        fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="54" y="205" text-anchor="middle" fill="#94a3b8">2001</text>
  <line x1="92" y1="200" x2="126" y2="200"
        stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr-muted)"/>

  <!-- Node 2002 -->
  <rect x="126" y="182" width="76" height="36" rx="4"
        fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="164" y="205" text-anchor="middle" fill="#94a3b8">2002</text>
  <line x1="202" y1="200" x2="236" y2="200"
        stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr-muted)"/>

  <!-- Node 2003 -->
  <rect x="236" y="182" width="76" height="36" rx="4"
        fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="274" y="205" text-anchor="middle" fill="#94a3b8">2003</text>
  <line x1="312" y1="200" x2="346" y2="200"
        stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr-muted)"/>

  <!-- Node 2004 -->
  <rect x="346" y="182" width="76" height="36" rx="4"
        fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="384" y="205" text-anchor="middle" fill="#94a3b8">2004</text>
  <line x1="422" y1="200" x2="456" y2="200"
        stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr-muted)"/>

  <!-- nullptr — current lands here -->
  <text x="462" y="204" fill="#64748b" font-style="italic" font-size="12">nullptr</text>

  <!-- current pointer at nullptr -->
  <line x1="480" y1="248" x2="480" y2="214"
        stroke="#ea580c" stroke-width="2" marker-end="url(#arr-current)"/>
  <text x="480" y="265" text-anchor="middle" fill="#ea580c" font-weight="bold">current</text>
  <text x="480" y="282" text-anchor="middle" fill="#64748b" font-size="11">current == nullptr</text>

</svg>
